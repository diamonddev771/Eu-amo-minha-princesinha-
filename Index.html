<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Amor ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

.container{
position:relative;
text-align:center;
z-index:2;
}

.foto{
width:300px;
height:300px;
border-radius:50%;
overflow:hidden;
margin:auto;
box-shadow:
0 0 30px #ff4d88,
0 0 60px #ff4d88,
0 0 100px #ff4d88;
animation:flutuar 4s ease-in-out infinite;
}

.foto img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
color:white;
font-size:2.5rem;
margin-top:20px;
text-shadow:0 0 20px #ff4d88;
}

p{
color:white;
font-size:1.2rem;
max-width:500px;
margin:20px auto;
line-height:1.6;
}

.heart{
position:absolute;
color:#ff4d88;
font-size:25px;
animation:subir linear infinite;
opacity:.8;
}

@keyframes subir{
0%{
transform:translateY(100vh) scale(0);
}
100%{
transform:translateY(-100vh) scale(1.5);
}
}

@keyframes flutuar{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-20px);
}
}
</style>
</head>

<body>

<div class="container">

<div class="foto">
<img src="SUA-FOTO.jpg">
</div>

<h1>❤️ Meu Amor ❤️</h1>

<p>
Você é a pessoa mais especial da minha vida.
Cada sorriso seu ilumina meu mundo
e faz tudo valer a pena.
❤️
</p>

</div>

<script>
for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=
(Math.random()*5+5)+"s";

heart.style.fontSize=
(Math.random()*30+15)+"px";

document.body.appendChild(heart);
}
</script>

</body>
</html>
